<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#173f35">
  <title>MathBank Studio</title>
  <link rel="stylesheet" href="/vendor/katex/katex.min.css">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#dashboard" aria-label="MathBank Studio 홈">
        <span class="brand-mark">M</span>
        <span><b>MathBank</b><small>STUDIO</small></span>
      </a>
      <nav class="side-nav" aria-label="주 메뉴">
        <button data-route="dashboard" class="active"><span>⌂</span>대시보드</button>
        <button data-route="upload"><span>↥</span>PDF 가져오기</button>
        <button data-route="review"><span>✓</span>추출 검수 <em id="review-count">0</em></button>
        <button data-route="bank"><span>▦</span>문제은행</button>
        <button data-route="exams"><span>▤</span>시험지 제작</button>
        <button data-route="settings"><span>⚙</span>OCR 설정</button>
      </nav>
      <div class="side-note">
        <span class="status-dot"></span>
        <div><b>로컬 저장</b><small>원본과 수정 이력 보호</small></div>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <button class="mobile-menu" aria-label="메뉴 열기">☰</button>
        <div>
          <p class="eyebrow" id="page-eyebrow">WORKSPACE</p>
          <h1 id="page-title">오늘의 문제은행</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-btn" id="refresh-btn" title="새로고침">↻ <span>새로고침</span></button>
          <button class="primary-btn" data-go="upload">PDF 추가</button>
        </div>
      </header>
      <main id="app" tabindex="-1">
        <div class="loading-state"><span class="spinner"></span><p>문제은행을 불러오는 중입니다.</p></div>
      </main>
    </section>
  </div>

  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
  <dialog id="modal" class="modal"><div id="modal-content"></div></dialog>
  <script src="/vendor/katex/katex.min.js"></script>
  <script src="/vendor/katex/contrib/auto-render.min.js"></script>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
